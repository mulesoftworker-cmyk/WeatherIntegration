<template>
    <lightning-card title="Weather Station" icon-name="utility:sun">
        <div class="slds-var-p-around_medium">
            <lightning-combobox
                name="city"
                label="Select a City"
                value={city}
                placeholder="Select City"
                options={cityOptions}
                onchange={handleCityChange}>
            </lightning-combobox>
            
            <lightning-button 
                label="Get Weather" 
                onclick={fetchWeather} 
                class="slds-var-m-top_small">
            </lightning-button>
<template if:true={weatherData}>
    <div class="slds-var-m-top_medium slds-box slds-theme_shade">
        <!-- Safety check: only render if current data exists -->
        <template if:true={weatherData.current}>
            <p><strong>Location:</strong> {weatherData.location.name}, {weatherData.location.region}</p>
            <p><strong>Temperature:</strong> {weatherData.current.temperature}°F</p>
            <p><strong>Feels Like:</strong> {weatherData.current.feelslike}°F</p>
            <p><strong>Conditions:</strong> {weatherData.current.weather_descriptions}</p>
            <p><strong>Humidity:</strong> {weatherData.current.humidity}%</p>
            <p><strong>Wind Speed:</strong> {weatherData.current.wind_speed} mph</p>
        </template>
    </div>
</template>
        </div>
    </lightning-card>
</template>
